# ============================
# DEV PROFILE — H2 in-memory
# ============================

spring.datasource.url=jdbc:h2:mem:nexusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Visit http://localhost:8081/h2-console to browse the database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI at http://localhost:8081/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
